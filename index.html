  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background:#071b4a;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      padding:20px;
    }

    .card{
      width:100%;
      max-width:420px;
      background:#102b67;
      border-radius:30px;
      padding:35px 25px;
      text-align:center;
      color:white;
      box-shadow:0 0 20px rgba(0,0,0,0.3);
    }

    .profile img{
      width:140px;
      height:140px;
      border-radius:50%;
      border:6px solid #ffd700;
      object-fit:cover;
      box-shadow:0 0 20px #ffd700;
    }

    h1{
      color:#ffd700;
      font-size:42px;
      margin-top:25px;
      line-height:1.1;
      font-weight:800;
    }

    .subtitle{
      margin-top:18px;
      font-size:22px;
      color:#e6e6e6;
    }

    .features{
      margin-top:35px;
      background:rgba(255,255,255,0.08);
      border-radius:20px;
      padding:25px;
      text-align:left;
    }

    .features p{
      font-size:22px;
      margin:18px 0;
    }

    .btn{
      display:block;
      margin-top:35px;
      text-decoration:none;
      background:linear-gradient(90deg,#00ff99,#00cfff);
      color:#000;
      padding:22px;
      border-radius:20px;
      font-size:28px;
      font-weight:bold;
      transition:0.3s;
      border:none;
      cursor:pointer;
      font-family: Arial, sans-serif;
    }

    .btn:hover{
      transform:scale(1.03);
    }

    .bottom{
      margin-top:35px;
      color:#ffd700;
      font-size:24px;
      font-weight:bold;
    }

    .risk{
      margin-top:15px;
      color:#d9d9d9;
      font-size:18px;
    }
  </style>

<body>

  <div class="card">

    <div class="profile">
      <img src="https://i.ibb.co/278NpwzM/IMG-20260615-135829-937.jpg" alt="PANKAJ Bhardwaj">
    </div>

    <h1>PANKAJ<br>BHARDWAJ</h1>

    <div class="subtitle">
      Stock Market • Options • Trading Signals
    </div>

    <div class="features">
      <p>✅ Daily High Accuracy Signals</p>
      <p>✅ Live Market Updates</p>
      <p>✅ Beginner Friendly Support</p>
      <p>✅ Active Trading Community</p>
    </div>

    <button class="btn" onclick="joinTelegram()">
      🚀 Join Telegram Channel
    </button>

    <div class="bottom">
      ⏳ Limited Seats Available
    </div>

    <div class="risk">
      Market investments are subject to risk.
    </div>

  </div>

  <script>
    function joinTelegram() {
      const inviteCode = 'NlWnMMEbSu9lM2I1';
      
      // Telegram links की कोशिश करें
      const links = [
        'tg://join?invite=' + inviteCode, // Telegram app
        'https://t.me/+' + inviteCode,    // Web version
        'https://telegram.me/+' + inviteCode // Backup
      ];
      
      // पहला लिंक खोलें
      window.location.href = links[0];
      
      // अगर app नहीं है तो web version खोलें
      setTimeout(() => {
        window.open(links[1], '_blank');
      }, 2000);
    }
  </script>

</body>
